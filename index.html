<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEX - Shaping Tomorrow</title>

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    body {
      background-color: black;
      color: white;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }

    /* Video Background */
    #bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    /* Liquid Glass CSS */
    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 20%,
        rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.3) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Fade-in Utility */
    .fade-in {
      opacity: 0;
      transition-property: opacity;
      transition-timing-function: ease-in-out;
    }
    .fade-in.is-visible {
      opacity: 1;
    }

    /* Animated Character */
    .char-span {
      display: inline-block;
      opacity: 0;
      transform: translateX(-18px);
      transition: opacity 500ms ease, transform 500ms ease;
    }
    .char-span.is-visible {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>
<body class="font-sans antialiased flex flex-col min-h-screen">

  <video id="bg-video" autoplay loop muted playsinline>
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260403_050628_c4e32401-fab4-4a27-b7a8-6e9291cd5959.mp4" type="video/mp4">
  </video>

  <!-- Navbar -->
  <div class="w-full px-6 md:px-12 lg:px-16 pt-6 z-10 w-full relative">
    <div class="liquid-glass rounded-xl px-4 py-2 flex items-center justify-between">
      <!-- Left: Logo text or image -->
      <div class="flex items-center gap-3">
        <img src="logo.png" alt="Logo" class="h-8 w-auto rounded object-contain" onerror="this.src='../public/logo.png'; this.onerror=null;">
        <span class="text-2xl font-semibold tracking-tight">VEX</span>
      </div>
      
      <!-- Center: Links -->
      <nav class="hidden md:flex gap-8">
        <a href="#" class="text-sm text-gray-300 hover:text-white transition-colors duration-200">Story</a>
        <a href="#" class="text-sm text-gray-300 hover:text-white transition-colors duration-200">Investing</a>
        <a href="#" class="text-sm text-gray-300 hover:text-white transition-colors duration-200">Building</a>
        <a href="#" class="text-sm text-gray-300 hover:text-white transition-colors duration-200">Advisory</a>
      </nav>

      <!-- Right: Button -->
      <div>
        <a href="#" class="bg-white text-black px-6 py-2 rounded-lg text-sm font-medium hover:bg-gray-100 transition-colors duration-200">
          Start a Chat
        </a>
      </div>
    </div>
  </div>

  <!-- Hero Content -->
  <div class="flex-1 flex flex-col justify-end px-6 md:px-12 lg:px-16 pb-12 lg:pb-16 z-10 relative mt-auto">
    <div class="lg:grid lg:grid-cols-2 lg:items-end w-full">
      
      <!-- Left Column -->
      <div class="mb-8 lg:mb-0">
        <h1 id="animated-heading" class="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-normal mb-4 text-white" style="letter-spacing: -0.04em;"></h1>
        
        <p class="fade-in text-base md:text-lg text-gray-300 mb-5 max-w-xl" style="transition-duration: 1000ms;" data-delay="800">
          We back visionaries and craft ventures that define what comes next.
        </p>

        <div class="fade-in flex flex-wrap gap-4" style="transition-duration: 1000ms;" data-delay="1200">
          <a href="#" class="bg-white text-black px-8 py-3 rounded-lg font-medium hover:bg-gray-100 transition-colors">
            Start a Chat
          </a>
          <a href="#" class="liquid-glass border border-white/20 px-8 py-3 rounded-lg font-medium hover:bg-white hover:text-black transition-colors duration-300 text-white">
            Explore Now
          </a>
        </div>
      </div>

      <!-- Right Column -->
      <div class="flex items-end justify-start lg:justify-end">
        <div class="fade-in liquid-glass border border-white/20 px-6 py-3 rounded-xl" style="transition-duration: 1000ms;" data-delay="1400">
          <p class="text-lg md:text-xl lg:text-2xl font-light text-white">
            Investing. Building. Advisory.
          </p>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Setup Text Animation for Heading
      const headingContainer = document.getElementById('animated-heading');
      const textLines = ["Shaping tomorrow", "with vision and action."];
      
      let initialDelay = 200;
      const charDelay = 30;

      textLines.forEach((line, lineIndex) => {
        const lineDiv = document.createElement('div');
        for (let charIndex = 0; charIndex < line.length; charIndex++) {
          const char = line[charIndex];
          const span = document.createElement('span');
          span.className = 'char-span';
          span.textContent = char === ' ' ? '\u00A0' : char;
          
          // Spec formula: (lineIndex * lineLength * charDelay) + (charIndex * charDelay)
          const lineLength = textLines[lineIndex].length;
          const delay = initialDelay + (lineIndex * lineLength * charDelay) + (charIndex * charDelay);
          
          span.style.transitionDelay = `${delay}ms`;
          
          // Trigger animation
          setTimeout(() => {
            span.classList.add('is-visible');
          }, 10);
          
          lineDiv.appendChild(span);
        }
        headingContainer.appendChild(lineDiv);
      });

      // Setup Fade-in Elements
      const fadeElements = document.querySelectorAll('.fade-in');
      fadeElements.forEach(el => {
        const delay = parseInt(el.getAttribute('data-delay') || '0', 10);
        setTimeout(() => {
          el.classList.add('is-visible');
        }, delay);
      });
    });
  </script>
</body>
</html>
